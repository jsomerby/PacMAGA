<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PacMAGA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background:#000; width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  overflow:hidden; font-family:'Courier New', monospace; user-select:none;
}
#gameCanvas { display:block; max-width:100vw; max-height:100vh; touch-action:none; }

/* ════ Landing / "Insert Coin" screen — faithful to the original ════ */
#landing{
  position:fixed; inset:0; background:#000; z-index:40;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Press Start 2P','Courier New',monospace; color:#FFD700;
}
#landing .scanlines{
  position:absolute; inset:0;
  background:repeating-linear-gradient(0deg,
    rgba(0,0,0,0.13) 0px, rgba(0,0,0,0.13) 1px, transparent 1px, transparent 3px);
  pointer-events:none; z-index:100;
}
#landing .stars{position:absolute; inset:0; pointer-events:none; overflow:hidden;}
#landing .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;
  animation:twinkle var(--d,2s) infinite var(--del,0s), starDrift var(--drift,180s) linear infinite var(--driftDel,0s);}
@keyframes twinkle{0%,100%{opacity:.3;}50%{opacity:1;}}
@keyframes starDrift{0%{transform:translateX(0);}100%{transform:translateX(-110vw);}}
#landing .container{display:flex;flex-direction:column;align-items:center;gap:32px;z-index:10;}
#landing .title-wrap{text-align:center;}
#landing .logo-img{
  width:clamp(280px,65vw,620px); display:block; margin:0 auto 4px; padding-top:12px;
  filter:drop-shadow(0 0 18px rgba(255,150,0,0.7)) drop-shadow(0 0 40px rgba(255,60,0,0.4));
  animation:pulse 2.5s ease-in-out infinite;
}
#landing .logo-img svg{width:100%;height:auto;display:block;}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 14px rgba(255,150,0,0.6)) drop-shadow(0 0 30px rgba(255,60,0,0.3));}
  50%{filter:drop-shadow(0 0 28px rgba(255,180,0,0.9)) drop-shadow(0 0 55px rgba(255,80,0,0.6));}}
#landing .subtitle{font-size:clamp(7px,1.2vw,11px);color:#FF4444;margin-top:10px;letter-spacing:2px;animation:lblink 1.5s step-end infinite;}
@keyframes lblink{0%,100%{opacity:1;}50%{opacity:0.4;}}
#landing .machine{
  background:#1A1A2E; border:3px solid #444; border-radius:12px; padding:28px 36px;
  display:flex; flex-direction:column; align-items:center; gap:20px;
  box-shadow:0 0 40px rgba(255,215,0,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  min-width:340px; max-width:480px; width:90vw;
}
#landing .arcade-deco{display:flex;gap:20px;align-items:center;font-size:9px;color:#555;}
#landing .deco-pac{width:24px;height:24px;background:#FFD700;border-radius:50%;
  clip-path:polygon(50% 50%, 100% 25%, 100% 0%, 0% 0%, 0% 100%, 100% 100%, 100% 75%);
  animation:chomp 0.4s steps(2) infinite;}
@keyframes chomp{
  0%{clip-path:polygon(50% 50%, 100% 25%, 100% 0%, 0% 0%, 0% 100%, 100% 100%, 100% 75%);}
  50%{clip-path:polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);}}
#landing .slot-area{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;}
#landing .slot-label{font-size:9px;color:#888;letter-spacing:2px;}
#landing .slot{width:80px;height:14px;background:#111;border:2px solid #555;border-radius:3px;
  position:relative;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,0.8);cursor:pointer;}
#landing .slot::after{content:'';position:absolute;inset:2px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);}
#landing .coin-track{position:relative;width:80px;height:100px;overflow:hidden;}
#landing .coin{position:absolute;width:32px;height:32px;
  background:radial-gradient(circle at 35% 35%, #FFE44D, #CC8800);
  border-radius:50%;border:2px solid #AA7700;top:-40px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#884400;
  font-family:'Courier New',monospace;font-weight:bold;
  transition:top 0.5s cubic-bezier(0.5,0,1,1);opacity:0;box-shadow:2px 2px 6px rgba(0,0,0,0.5);}
#landing .coin.dropping{opacity:1;}
#landing .coin.dropped{top:85px;}
#landing .coin-label{font-size:10px;font-weight:bold;}
#landing .btn-insert{display:block;width:100%;padding:14px 20px;
  background:linear-gradient(180deg,#CC0000,#880000);border:3px solid #FF2222;border-radius:6px;
  color:#FFD700;font-family:'Press Start 2P','Courier New',monospace;font-size:clamp(9px,1.5vw,12px);
  letter-spacing:1px;cursor:pointer;text-align:center;text-decoration:none;
  transition:transform 0.1s, box-shadow 0.1s;box-shadow:0 4px 0 #550000, 0 0 20px rgba(255,0,0,0.3);}
#landing .btn-insert:hover{transform:translateY(-2px);box-shadow:0 6px 0 #550000,0 0 30px rgba(255,80,0,0.5);
  background:linear-gradient(180deg,#EE0000,#990000);}
#landing .btn-insert:active{transform:translateY(4px);box-shadow:0 0 0 #550000;}
#landing .btn-insert span{display:block;font-size:0.7em;color:#FFAA88;margin-top:4px;}
#landing .divider{width:100%;text-align:center;position:relative;color:#444;font-size:9px;letter-spacing:3px;}
#landing .divider::before,#landing .divider::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:#333;}
#landing .divider::before{left:0;} #landing .divider::after{right:0;}
#landing .btn-decline{width:100%;padding:12px 16px;background:transparent;border:1px solid #333;border-radius:4px;
  color:#555;font-family:'Press Start 2P','Courier New',monospace;font-size:clamp(6px,0.9vw,8px);
  line-height:1.7;letter-spacing:0.5px;cursor:pointer;text-align:center;transition:color 0.2s, border-color 0.2s;}
#landing .btn-decline:hover{color:#888;border-color:#555;}
#landing .ticker{position:absolute;left:0;right:0;bottom:18px;font-size:11px;color:#FFD700;letter-spacing:3px;
  overflow:hidden;width:100vw;z-index:50;text-shadow:0 0 8px rgba(255,180,0,0.6);pointer-events:none;}
#landing .ticker-inner{display:inline-block;white-space:nowrap;padding-left:100%;animation:scroll-x 28s linear infinite;}
@keyframes scroll-x{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
#landing .go-overlay{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity 0.6s;
  z-index:200;display:flex;align-items:center;justify-content:center;
  font-family:'Press Start 2P','Courier New',monospace;font-size:22px;color:#FFD700;letter-spacing:4px;}
#landing .go-overlay.active{opacity:1;pointer-events:all;}
/* ── On-screen joystick (touch only) ── */
#dpad{
  position:fixed; left:50%; transform:translateX(-50%); bottom:calc(14px + env(safe-area-inset-bottom));
  z-index:45; display:none;
  grid-template-columns:repeat(3,58px); grid-template-rows:repeat(3,58px); gap:6px;
  touch-action:none; user-select:none;
}
#dpad.show{ display:grid; }
#dpad .dbtn{
  -webkit-appearance:none; appearance:none; font-family:inherit;
  background:rgba(20,20,30,0.5); border:2px solid rgba(255,215,0,0.55);
  color:#FFD700; border-radius:12px; font-size:24px; line-height:1;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; touch-action:none; -webkit-tap-highlight-color:transparent;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
#dpad .dbtn.active{ background:rgba(255,215,0,0.35); transform:scale(0.94); }
#dpad .up{grid-column:2;grid-row:1;} #dpad .left{grid-column:1;grid-row:2;}
#dpad .mid{grid-column:2;grid-row:2;background:rgba(20,20,30,0.28);border-color:rgba(255,215,0,0.2);border-radius:50%;pointer-events:none;}
#dpad .right{grid-column:3;grid-row:2;} #dpad .down{grid-column:2;grid-row:3;}
/* allow the coin screen to scroll if it ever overflows a small screen */
#landing{ overflow:auto; padding:16px 0; -webkit-overflow-scrolling:touch; }
#landing .container{ width:100%; }
/* narrow phones (portrait) */
@media (max-width:430px){
  #landing .container{ gap:20px; }
  #landing .machine{ min-width:0; width:92vw; padding:20px 18px; gap:14px; }
  #landing .logo-img{ width:86vw; }
  #landing .subtitle{ font-size:8px; }
}
/* short / landscape phones — pack it in vertically so it all fits */
@media (max-height:560px){
  #landing{ justify-content:flex-start; }
  #landing .container{ gap:12px; }
  #landing .logo-img{ width:min(60vw,360px); padding-top:4px; }
  #landing .machine{ padding:14px 22px; gap:10px; }
  #landing .coin-track{ height:54px; }
  #landing .btn-insert{ padding:10px 16px; }
  #landing .ticker{ display:none; }
}
</style>
</head>

// crosses its value. L8 ramps 0→0.25, L9 →0.7, L10 →1.0 — so READY and the
// shop signs go first, the HUD follows in L9, everything by L10.
const FLIP_AT={ READY:0.08, OPEN:0.10, HELPWANTED:0.18, LEVEL:0.30, PROTEIN:0.35,
  LIVES:0.40, SCORE:0.48, HISCORE:0.55, PAUSE:0.58, SURVIVE:0.62, DEPORTED:0.65,
  BURGER:0.72, MUTE:0.76, CLOSED:0.80, PRESSKEY:0.86, GAMEOVER:0.92, INSERTCOIN:0.97 };
function strHash(k){ return FLIP_AT[k]!==undefined?FLIP_AT[k]:0.5; }
let spanishRatio = 0;            // live, ramps within L8–10
let glitchFlips = {};            // key → frames remaining of glitch flicker
function T(key){
  const e=STR[key]; if(!e) return key;
  return strHash(key) < spanishRatio ? e[1] : e[0];
}
// ═════════════════════════════════════════════════════════════════
//  MAZE — '#' wall, '.' path, letters = shop tiles (solid), 'o' pellet spots
// ═════════════════════════════════════════════════════════════════
const MAP_SRC = [
'#######################',
'#o...................o#',
'#.###.#####.#####.###.#',
'#.AAA.#####.#####.BBB.#',
'#.AAA.#####.#####.BBB.#',
'#.......###.###.......#',
'#.#####.###.###.#####.#',
'#.#####.CCC.DDD.#####.#',
'#.#####.CCC.DDD.#####.#',
'#.###.............###.#',
'#.###.###.....###.###.#',
'..###.###.....###.###..',
'#.###.###.....###.###.#',
'#.###.............###.#',
'#.#####.###.###.#####.#',
'#.#####.EEE.FFF.#####.#',
'#.#####.EEE.FFF.#####.#',
'#.....................#',
'#.###.#####.#####.###.#',
'#.GGG.#####.#####.HHH.#',
'#.GGG.#####.#####.HHH.#',
'#o...................o#',
'#######################',
];
const TUNNEL_ROW=11;       // side tunnels wrap to the opposite edge
let mapData=[];            // 0 path, 1 wall, 2 shop tile
let shopDefs={};           // id → {tiles:[{c,r}], cx,cy, frontTile}
let pelletSpots=[];        // {c,r}
function buildMap(){
  mapData=[]; shopDefs={}; pelletSpots=[];
  for(let r=0;r<ROWS;r++){
    const row=[];
    for(let c=0;c<COLS;c++){
      const ch=MAP_SRC[r][c];
      if(ch==='#') row.push(1);
      else if(ch>='A'&&ch<='H'){
        row.push(2);
        if(!shopDefs[ch]) shopDefs[ch]={id:ch,tiles:[]};
        shopDefs[ch].tiles.push({c,r});
      } else {
        row.push(0);
        if(ch==='o') pelletSpots.push({c,r});
      }
    }
    mapData.push(row);
  }
  for(const id in shopDefs){
    const s=shopDefs[id];
    // bounding box of the storefront (3 wide × 2 tall)
    s.minC=Math.min(...s.tiles.map(t=>t.c)); s.maxC=Math.max(...s.tiles.map(t=>t.c));
    s.minR=Math.min(...s.tiles.map(t=>t.r)); s.maxR=Math.max(...s.tiles.map(t=>t.r));
    s.cx=(s.minC+s.maxC+1)/2*TILE;
    s.cy=(s.minR+s.maxR+1)/2*TILE;
    // front: open tile below the door (bottom-center column)
    const fc=Math.floor((s.minC+s.maxC)/2), fr=s.maxR+1;
    s.front = (mapData[fr]&&mapData[fr][fc]===0) ? {c:fc,r:fr}
            : (mapData[s.minR-1]&&mapData[s.minR-1][fc]===0) ? {c:fc,r:s.minR-1}
            : {c:fc,r:fr};
  }
}
const px=(c)=>c*TILE+TILE/2, py=(r)=>TOP+r*TILE+TILE/2;
function tileAt(x,y){ return {c:Math.floor(x/TILE), r:Math.floor((y-TOP)/TILE)}; }
function isWall(x,y){
  const c=Math.floor(x/TILE), r=Math.floor((y-TOP)/TILE);
  if(r===TUNNEL_ROW&&(c<0||c>=COLS)) return false; // tunnel mouths wrap
  if(c<0||c>=COLS||r<0||r>=ROWS) return true;
  return mapData[r][c]>=1;
}
function wrapX(e){ // side tunnels: step off one edge, appear at the other
  if(e.x<-TILE*0.4) e.x+=GW+TILE*0.8;
  else if(e.x>GW+TILE*0.4) e.x-=GW+TILE*0.8;
}
function wallCheck(cx,cy,rad){
  const r2=rad*0.80;
  return isWall(cx+r2,cy)||isWall(cx-r2,cy)||isWall(cx,cy+r2)||isWall(cx,cy-r2);
}
function openTiles(){
  const out=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(mapData[r][c]===0) out.push({c,r});
  return out;
}
function randOpenTile(){
  const o=openTiles();
  return o[(Math.random()*o.length)|0];
}

// ═════════════════════════════════════════════════════════════════
//  PROTEIN STATE MACHINE
// ═════════════════════════════════════════════════════════════════
function proteinState(){
  if(pac.withered) return 'WITHERED';
  const p=pac.protein;
  if(p>=90) return 'RENAL';
  if(p>=70) return 'FAT';
  if(p>=45) return 'SWOLE';
  if(p>=20) return 'BUFF';
  return 'SKINNY';
}
function stateSpeed(st){ return CONFIG.states[st].speed; }
// visual scale per state
// WITHERED keeps him bloated (not gaunt) — he never slims back down, just sickens
const STATE_SCALE={SKINNY:0.72, BUFF:0.95, SWOLE:1.18, FAT:1.30, RENAL:1.34, WITHERED:1.26};
const STATE_COLOR={SKINNY:'#FFEE88', BUFF:'#FFD700', SWOLE:'#FFC400', FAT:'#FFA800', RENAL:'#C8C076', WITHERED:'#A6B86A'};

function makePac(){
  return {
    x:px(11), y:py(11), vx:0, vy:0, pvx:0, pvy:0, facing:1,
    r:TILE*0.42, protein:10, withered:false,
    mouth:0.25, mouthDir:1,
    stumbleClock:0, stumbleLeft:0,
    boostLeft:0,                 // taco boost frames
    invinc:0, dead:false, deadAnim:0,
    turnDelay:0,
    everFat:false, everRenal:false, // body never fully recovers once it bloats
  };
}
// Once he's been heavy, weight is sticky and there's a floor he can't drop below —
// he can't get lean/fast again, which is the whole trap.
function proteinFloor(){
  if(pac.everRenal) return 72;   // renal → stays mostly fat/bloated
  if(pac.everFat)   return 56;   // fat → can never get back to lean, fast BUFF
  return 0;
}
function pacSpeed(){
  const st=proteinState();
  let s=CONFIG.pacBaseSpeed*stateSpeed(st);
  if(pac.boostLeft>0) s*=CONFIG.tacoBoostMult;
  return s;
}
function updatePac(){
  if(pac.dead){ pac.deadAnim++; return; }
  if(pac.invinc>0) pac.invinc--;
  if(pac.boostLeft>0) pac.boostLeft--;
  const st=proteinState();
  // RENAL stumble: periodic freeze + heart-monitor beep
  if(st==='RENAL'){
    pac.stumbleClock++;
    if(pac.stumbleClock>=CONFIG.stumbleEverySec*60){
      pac.stumbleClock=0; pac.stumbleLeft=CONFIG.stumbleSec*60; sfxBeep();
    }
  } else pac.stumbleClock=0;
  if(pac.stumbleLeft>0){ pac.stumbleLeft--; return; }

  const s=pacSpeed();
  const pr=pac.r*0.78;
  // FAT/RENAL wider turning: pending direction applies after a short delay
  const wantsTurn=(pac.pvx!==pac.vx||pac.pvy!==pac.vy)&&(pac.pvx!==0||pac.pvy!==0);
  if(wantsTurn){
    if((st==='FAT'||st==='RENAL') && pac.turnDelay<3){ pac.turnDelay++; }
    else if(!wallCheck(pac.x+pac.pvx*s*2, pac.y+pac.pvy*s*2, pr)){
      // snap to lane center on turn for clean cornering
      if(pac.pvx!==0) pac.y=Math.round((pac.y-TOP-TILE/2)/TILE)*TILE+TILE/2+TOP;
      else            pac.x=Math.round((pac.x-TILE/2)/TILE)*TILE+TILE/2;
      pac.vx=pac.pvx; pac.vy=pac.pvy; pac.turnDelay=0;
    }
  } else pac.turnDelay=0;
  const nx=pac.x+pac.vx*s, ny=pac.y+pac.vy*s;
  if(!wallCheck(nx,pac.y,pr)) pac.x=nx; else pac.vx=0;
  if(!wallCheck(pac.x,ny,pr)) pac.y=ny; else pac.vy=0;
  wrapX(pac);
  if(pac.vx===1||pac.vx>0) pac.facing=1; else if(pac.vx<0) pac.facing=-1;
  // Mouth chomp
  const moving=pac.vx!==0||pac.vy!==0;
  if(moving){ pac.mouth+=pac.mouthDir*0.10; if(pac.mouth>0.34)pac.mouthDir=-1; if(pac.mouth<0.04)pac.mouthDir=1; }
  // remember the worst he's reached — bloat is permanent
  if(st==='FAT'||st==='RENAL') pac.everFat=true;
  if(st==='RENAL') pac.everRenal=true;
  // Meter drain — eating is his only verb
  if(!pac.withered){
    let drain=L().drain;
    // once fat, the weight clings: losing it is slow and grinding
    if(pac.everFat && pac.protein>proteinFloor()+4) drain*=0.4;
    pac.protein=Math.max(proteinFloor(), pac.protein-drain);
    // famine never fully wastes him now — he stays mainly bloated, just greener (see drawPac)
  }
  // Eat foods
  const eatR=pac.r*STATE_SCALE[st]*0.8+8;
  for(const f of foods){
    if(!f.active) continue;
    const dx=pac.x-f.x, dy=pac.y-f.y;
    if(dx*dx+dy*dy<eatR*eatR){
      f.active=false;
      if(f.type==='burger'){
        score+=CONFIG.burgerPoints;
        // each level has a protein ceiling so the body arc is paced:
        // BUFF in the early levels, SWOLE by L3, FAT/RENAL only later
        const cap=L().pCap!==undefined?L().pCap:100;
        if(!pac.withered) pac.protein=Math.min(Math.max(cap,pac.protein),pac.protein+CONFIG.burgerProtein);
        sfxWaka();
      } else { // taco — buys seconds, never survival
        score+=CONFIG.tacoPoints;
        pac.boostLeft=CONFIG.tacoBoostSec*60;
        sfxTaco();
      }
    }
  }
  // Eat pellets (supplements) — L1–7 only
  for(const p of pellets){
    if(!p.active) continue;
    const dx=pac.x-p.x, dy=pac.y-p.y;
    if(dx*dx+dy*dy<(eatR+2)*(eatR+2)){
      p.active=false; p.respawn=CONFIG.pelletRespawnSec*60; score+=CONFIG.pelletPoints;
      sfxPellet();
      for(const g of ghosts) if(g.state==='ROAM'||g.state==='WORK'||g.state==='FLEE')
        { g.state='FRIGHT'; g.frightLeft=CONFIG.frightenedSec*60; }
      addFloater(p.x,p.y,p.label,'#7FE0FF');
    }
  }
}

// ═════════════════════════════════════════════════════════════════
//  SHOPS & THE BURGER ECONOMY
// ═════════════════════════════════════════════════════════════════
function initShops(){
  shops={};
  const cfg=L();
  const all=['A','B','C','D','E','F','G','H'];
  for(const id of all){
    if(!shopDefs[id]) continue;
    const open=cfg.shopsOpen.includes(id);
    const dark=cfg.shopsDark.includes(id);
    if(!open&&!dark&&!cfg.taquerias) continue;
    shops[id]={ id, def:shopDefs[id], open, taqueria:false,
      spawnClock:Math.random()*120, staff:[], reopenAt:0 };
  }
  // assign maze regions: every open tile belongs to its nearest shop
  assignRegions();
}
function assignRegions(){
  for(const id in shops) shops[id].region=[];
  const ids=Object.keys(shops);
  if(!ids.length) return;
  for(const t of openTiles()){
    let best=null,bd=1e9;
    for(const id of ids){
      const s=shops[id];
      const dx=px(t.c)-s.def.cx, dy=py(t.r)-s.def.cy, d=dx*dx+dy*dy;
      if(d<bd){bd=d;best=id;}
    }
    shops[best].region.push(t);
  }
}
function shopStaffAlive(s){ return s.staff.filter(g=>g.state!=='DEPORTED'&&g.state!=='GONE').length; }
function updateShops(){
  const cfg=L();
  for(const id in shops){
    const s=shops[id];
    if(cfg.taquerias){
      // L8+: closed shops reopen as taquerías over time
      if(!s.taqueria && tick>=s.reopenAt && s.reopenAt>0){
        s.taqueria=true; s.open=true; sfxReopen();
        addFloater(s.def.cx,s.def.cy-14,T('OPEN'),'#FFB347');
      }
      if(s.taqueria){
        s.spawnClock+=cfg.tacoRate;
        if(s.spawnClock>=170){
          s.spawnClock=0;
          spawnFoodInRegion(s,'taco');
        }
      }
      continue;
    }
    if(!s.open) continue;
    // staffed shop produces burgers; deport all staff → permanently dark
    if(shopStaffAlive(s)===0 && s.staff.length>0){
      s.open=false; s.justClosed=tick; sfxShopClose();
      continue;
    }
    s.spawnClock+=cfg.spawnRate;
    if(s.spawnClock>=140){
      s.spawnClock=0;
      spawnFoodInRegion(s,'burger');
    }
  }
}
function spawnFoodInRegion(s,type){
  const live=foods.filter(f=>f.active&&f.shop===s.id).length;
  if(live>=CONFIG.regionBurgerCap) return;
  const open=s.region.filter(t=>{
    const fx=px(t.c),fy=py(t.r);
    if(pac && Math.abs(pac.x-fx)<TILE*2.5 && Math.abs(pac.y-fy)<TILE*2.5) return false; // not on top of him
    return !foods.some(f=>f.active&&Math.abs(f.x-fx)<4&&Math.abs(f.y-fy)<4);
  });
  if(!open.length) return;
  const t=open[(Math.random()*open.length)|0];
  foods.push({x:px(t.c),y:py(t.r),type,active:true,shop:s.id,born:tick});
}
// ═════════════════════════════════════════════════════════════════
//  GHOSTS — grid AI: chase / ambush / wander roles; FRIGHT; deportation.
//  L1–7: sombrero-wearing workers (PacMAGA's flattened perception).
//  L8–10: vivid individuals, returned through the breach.
// ═════════════════════════════════════════════════════════════════
const GHOST_BROWNS=['#8B5A2B','#A0522D','#6B4423','#C68642','#7B3F00','#5C3317'];
const GHOST_VIVID=[
  {c:'#E84855',hat:'cap'},   {c:'#3185FC',hat:'none'}, {c:'#35C04B',hat:'apron'},
  {c:'#F2A33C',hat:'guitar'},{c:'#9D5CE6',hat:'cap'},  {c:'#19C3B1',hat:'apron'},
  {c:'#F25CA2',hat:'none'},  {c:'#FFD23F',hat:'guitar'},
];
const ROLES=['chase','ambush','wander'];
let ghostSeq=0;
function makeGhost(opts){
  const id=ghostSeq++;
  return Object.assign({
    id, x:0,y:0, dir:{x:1,y:0}, r:TILE*0.40,
    speed:CONFIG.ghostBaseSpeed, role:ROLES[id%3],
    state:'ROAM', frightLeft:0, anim:Math.random()*6,
    shop:null, workClock:120+Math.random()*240, cooking:0,
    vivid:null, deportT:0, dx0:0,dy0:0,
  },opts);
}
function initGhosts(){
  // keep the deported crowd — they stay beyond the wall through every level
  ghosts=ghosts.filter(g=>g.state==='DEPORTED'||g.state==='DEPORT');
  levelDeports=0; ghostJoinTimer=0;
  const cfg=L();
  if(isEndgame()){
    for(let i=0;i<cfg.ghosts;i++) spawnReturner(i*8);
    return;
  }
  // distribute ghosts among open shops as staff
  const openIds=Object.keys(shops).filter(id=>shops[id].open);
  for(let i=0;i<cfg.ghosts;i++){
    const sid=openIds[i%Math.max(1,openIds.length)];
    const s=shops[sid];
    const g=makeGhost({ shop:sid, speed:CONFIG.ghostBaseSpeed*cfg.ghostSpeed });
    const f=s?s.def.front:randOpenTile();
    // stagger stand spots so staff don't stack on one tile
    const near=dirsAt(f.c,f.r).map(d=>({c:f.c+d.x,r:f.r+d.y}));
    const spot=(i%3===0||!near.length)?f:near[i%near.length];
    g.x=px(spot.c); g.y=py(spot.r);
    // half the staff starts off-shift, wandering the maze
    if(i%2===0){ g.state='WORK'; }
    else { g.state='ROAM'; g.roamClock=200+Math.random()*400; const t=randOpenTile(); g.x=px(t.c); g.y=py(t.r); }
    if(s) s.staff.push(g);
    ghosts.push(g);
  }
}
function spawnReturner(delay){
  // enters through the breach at top-middle of the maze
  const g=makeGhost({ speed:CONFIG.ghostBaseSpeed*L().ghostSpeed, state:'ENTER' });
  g.vivid=GHOST_VIVID[g.id%GHOST_VIVID.length];
  // appears on the far side of the wall and walks in through the breach
  g.x=px(11)+(Math.random()-0.5)*120; g.y=HUDH+14; g.enterDelay=delay||0;
  ghosts.push(g);
  return g;
}
function tileCenter(g){ // is ghost near a tile center (decision point)?
  const cx=(g.x-TILE/2)%TILE, cy=(g.y-TOP-TILE/2)%TILE;
  return Math.abs(cx)<g.speed*0.6+0.1 && Math.abs(cy)<g.speed*0.6+0.1;
}
function dirsAt(c,r){
  const out=[];
  const cand=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
  for(const d of cand){
    const nc=c+d.x, nr=r+d.y;
    if(nr===TUNNEL_ROW&&(nc<0||nc>=COLS)){ out.push(d); continue; } // into the tunnel
    if(nc>=0&&nc<COLS&&nr>=0&&nr<ROWS&&mapData[nr][nc]===0) out.push(d);
  }
  return out;
}
function chooseDir(g,target,flee){
  const t=tileAt(g.x,g.y);
  let ds=dirsAt(t.c,t.r);
  // no reversing unless dead end
  const rev={x:-g.dir.x,y:-g.dir.y};
  const noRev=ds.filter(d=>!(d.x===rev.x&&d.y===rev.y));
  if(noRev.length) ds=noRev;
  if(!ds.length) return rev;
  if(!target) return ds[(Math.random()*ds.length)|0];
  let best=ds[0], bd=flee?-1:1e18;
  for(const d of ds){
    const nx=px(t.c+d.x), ny=py(t.r+d.y);
    const dd=(nx-target.x)**2+(ny-target.y)**2;
    if(flee? dd>bd : dd<bd){ bd=dd; best=d; }
  }
  // wanderers are sloppy
  if(g.role==='wander'&&Math.random()<0.35) return ds[(Math.random()*ds.length)|0];
  return best;
}
const SCATTER=[[1,1],[21,1],[1,21],[21,21]];
function ghostTarget(g){
  if(g.role==='ambush'){
    return {x:pac.x+pac.vx*TILE*4*Math.sign(pac.vx||1), y:pac.y+pac.vy*TILE*4};
  }
  if(g.role==='wander'){
    // patrols a corner, only joins the hunt when close — so the pack
    // surrounds rather than forms a single conga line
    const dx=pac.x-g.x, dy=pac.y-g.y;
    if(dx*dx+dy*dy>(TILE*6)**2){
      const sc=SCATTER[g.id%4];
      return {x:px(sc[0]),y:py(sc[1])};
    }
  }
  return {x:pac.x,y:pac.y};
}
function moveGhost(g,target,flee){
  if(tileCenter(g)){
    const t=tileAt(g.x,g.y);
    g.x=px(t.c); g.y=py(t.r);
    g.dir=chooseDir(g,target,flee);
  }
  // frightened ghosts run hard, but stay (barely) catchable even by a RENAL player
  const sp=g.state==='FRIGHT'?Math.min(g.speed*0.85,CONFIG.pacBaseSpeed*0.5):g.speed;
  const nx=g.x+g.dir.x*sp, ny=g.y+g.dir.y*sp;
  if(!wallCheck(nx,ny,g.r*0.7)){ g.x=nx; g.y=ny; }
  else { const t=tileAt(g.x,g.y); g.x=px(t.c); g.y=py(t.r); g.dir=chooseDir(g,target,flee); }
  wrapX(g);
}
function updateGhosts(){
  const cfg=L();
  // endgame: new ghosts pour through the breach
  if(isEndgame()&&cfg.ghostJoinSec){
    ghostJoinTimer++;
    let joinFrames=cfg.ghostJoinSec*60;
    if(cfg.endless) joinFrames=Math.max(70, joinFrames - Math.floor(levelTimer/60)*12); // accelerates
    if(ghostJoinTimer>=joinFrames){ ghostJoinTimer=0; spawnReturner(); sfxEnter(); }
  }
  for(const g of ghosts){
    g.anim+=0.12;
    switch(g.state){
      case 'WORK': {
        // stand at the shop front, run cook animation, drop burgers nearby
        const s=shops[g.shop];
        if(s&&s.open){
          const f0=s.def.front;
          const near=dirsAt(f0.c,f0.r).map(d=>({c:f0.c+d.x,r:f0.r+d.y}));
          const f=(g.id%3===0||!near.length)?f0:near[g.id%near.length];
          const fx2=px(f.c), fy2=py(f.r);
          const d=Math.hypot(fx2-g.x,fy2-g.y);
          if(d>6){ moveGhost(g,{x:fx2,y:fy2},false); }
          else {
            g.cooking++;
            g.workClock--;
            if(g.workClock<=0){ g.state='ROAM'; g.roamClock=240+Math.random()*300; g.cooking=0; }
          }
        } else { g.state='ROAM'; g.roamClock=400; }
        break;
      }
      case 'ROAM': {
        moveGhost(g,null,false);
        g.roamClock--;
        if(g.roamClock<=0&&g.shop&&shops[g.shop]&&shops[g.shop].open){
          g.state='WORK'; g.workClock=200+Math.random()*240;
        }
        break;
      }
      case 'FRIGHT': {
        g.frightLeft--;
        moveGhost(g,{x:pac.x,y:pac.y},true); // flee
        if(g.frightLeft<=0) g.state=g.shop?'ROAM':'CHASE', g.roamClock=200;
        // touched while frightened → deported over the wall
        if(!pac.dead&&pac.invinc<=0){
          const dx=pac.x-g.x,dy=pac.y-g.y;
          if(dx*dx+dy*dy<((pac.r*STATE_SCALE[proteinState()]*0.7)+g.r*0.8)**2) deportGhost(g);
        }
        break;
      }
      case 'DEPORT': { // arc over the border wall, landing visibly on the other side
        g.deportT+=0.022;
        const t2=Math.min(1,g.deportT);
        g.x=g.dx0+(g.slotX-g.dx0)*t2;
        g.y=g.dy0+(g.slotY-g.dy0)*t2 - Math.sin(t2*Math.PI)*(g.dy0-HUDH+40);
        if(g.deportT>=1){ g.state='DEPORTED'; g.x=g.slotX; g.y=g.slotY; }
        break;
      }
      case 'DEPORTED': { // waiting beyond the wall, in plain sight
        // a slow, tired sway — they stand and wait
        g.x=g.slotX+Math.sin(g.anim*0.2+g.id)*1.2;
        break;
      }
      case 'ENTER': { // L8+: cross the strip, then stream in through the breach
        if(g.enterDelay>0){ g.enterDelay--; break; }
        // converge on the breach first, then descend
        if(Math.abs(g.x-px(11))>2 && g.y<TOP-10){ g.x+=Math.sign(px(11)-g.x)*1.2; }
        g.y+=1.4;
        if(g.y>=py(1)){ g.y=py(1); g.x=px(11);
          g.state='MIGRATE';
          g.chaseDelay=cfg.chase?240:0; // mill around before joining the hunt
          g.dir={x:Math.random()<0.5?1:-1,y:0};
          claimTaqueria(g);
        }
        break;
      }
      case 'MIGRATE': { // head to a shop to reopen it / mill around
        if(g.chaseDelay>0 && --g.chaseDelay<=0 && cfg.chase){
          const hunters=ghosts.filter(x=>x.state==='CHASE').length;
          if(cfg.endless || hunters<CONFIG.maxChasersL9) g.state='CHASE';
          else g.chaseDelay=120; // wait for an opening
        }
        if(g.goal){
          const d=Math.hypot(g.goal.x-g.x,g.goal.y-g.y);
          if(d<TILE*0.8){ g.goal=null; }
          else moveGhost(g,g.goal,false);
        } else moveGhost(g,null,false);
        touchPac(g);
        break;
      }
      case 'CHASE': {
        moveGhost(g,ghostTarget(g),false);
        touchPac(g);
        break;
      }
    }
  }
}
function claimTaqueria(g){
  // each returning ghost reopens the longest-closed shop
  const closed=Object.values(shops).filter(s=>!s.taqueria&&s.reopenAt===0);
  if(closed.length){
    const s=closed[(Math.random()*closed.length)|0];
    s.reopenAt=tick+120+Math.random()*240;
    if(!L().chase) g.goal={x:s.def.cx,y:s.def.cy+TILE};
  }
}
let deportSlotSeq=0;
// Where each deported ghost ends up beyond the wall. The crowd persists across
// levels and packs into rows, so it visibly grows as the game goes on.
function assignDeportSlot(g, slot){
  const perRow=20, stepX=(GW-24)/perRow;
  const row=Math.floor(slot/perRow);
  const brick=(row%2)*stepX*0.45;            // offset alternate rows so it reads as a crowd
  g.slotX = 14 + (slot%perRow)*stepX + brick;
  g.slotY = HUDH+22 + (row%3)*9;             // 3 stacked rows; beyond that they overlap (packed)
}
function deportGhost(g){
  g.state='DEPORT'; g.deportT=0; g.dx0=g.x; g.dy0=g.y;
  assignDeportSlot(g, deportSlotSeq++);       // a permanent spot — he never gets it back
  totalDeports++; levelDeports++; score+=CONFIG.deportPoints;
  shake=8; sfxEagle();
  addFloater(g.x,g.y,'+'+CONFIG.deportPoints,'#FFD700');
  if(totalDeports%CONFIG.btcPerDeports===0){
    btcCount++; btcFlash=90; sfxCoin();
    addFloater(pac.x,pac.y-20,'+1 BTC','#F7931A');
  }
}
function touchPac(g){
  // L8+: ghosts can damage HIM
  if(pac.dead||pac.invinc>0) return;
  const dx=pac.x-g.x,dy=pac.y-g.y;
  if(dx*dx+dy*dy<((pac.r*STATE_SCALE[proteinState()]*0.7)+g.r*0.8)**2){
    loseLife();
  }
}
function loseLife(){
  lives--;
  pac.dead=true; pac.deadAnim=0;
  finalDeath=(lives<=0);
  deathTimer=0;
  sfxDeath(finalDeath&&level===10);
  if(level!==10) stopMusic(); // L10: the mariachi does not stop
}

const PELLET_LABELS=['RAW MILK','PEPTIDES','BEEF TALLOW','COLOSTRUM'];
function startLevel(n){
  level=n; levelTimer=0; ghostJoinTimer=0; famineFlags={};
  foods=[]; pellets=[]; floaters=[]; breachAnim=0;
  buildMap(); initShops(); initGhosts();
  const cfg=L();
  pac=Object.assign(makePac(),{
    protein: n===1?10 : n===7?92 : n>=8?4 : pac?Math.min(100,pac.protein):50,
    withered: n>=8,
  });
  if(n===6) pac.protein=92;            // RENAL by design
  if(n===5) pac.protein=78;            // FAT by design
  if(n===4&&pac.protein<60) pac.protein=62;
  if(n>=8){ pac.y=py(21); }            // start at the bottom, away from the breach
  // supplements
  const spots=pelletSpots.slice(0,cfg.pellets||0);
  pellets=spots.map((t,i)=>({x:px(t.c),y:py(t.r),active:true,label:PELLET_LABELS[i%PELLET_LABELS.length]}));
  // L7: a handful of stale burgers, then nothing
  if(cfg.staleBurgers){
    const o=openTiles();
    for(let i=0;i<cfg.staleBurgers;i++){
      const t=o[(Math.random()*o.length)|0];
      foods.push({x:px(t.c),y:py(t.r),type:'burger',active:true,shop:null,stale:true});
    }
  }
  // seed initial burgers so levels don't start empty
  if(cfg.spawnRate>0){
    for(const id in shops){ const s=shops[id];
      if(s.open){ spawnFoodInRegion(s,'burger'); spawnFoodInRegion(s,'burger'); }
    }
  }
  if(cfg.goal.type==='survive') surviveLeft=cfg.goal.sec;
  spanishRatio = n>=9 ? CONFIG.levels[n-1].spanishRatio : (n===8?0:cfg.spanishRatio);
  burgerPrice = cfg.burger?cfg.burger[0]:0;
  btcPrice = cfg.btc[0];
  gameState='CARD'; cardTimer=0; cardAlpha=0; cardDone=false;
  stopMusic(); playCardMusic();
}
function lerp(a,b,t){ return a+(b-a)*Math.max(0,Math.min(1,t)); }
function levelProgress(){
  const cfg=L();
  if(cfg.goal.type==='survive') return 1-(surviveLeft/cfg.goal.sec);
  if(cfg.goal.type==='deports') return levelDeports/cfg.goal.n;
  return Math.min(1,levelTimer/3600);
}
function pushBtcCandle(price){
  const open = btcCandleOpen==null ? price : btcCandleOpen;
  const close = price;
  const vol = Math.max(price*0.05, 1);
  const hi = Math.max(open,close) + Math.random()*vol;
  const lo = Math.max(0, Math.min(open,close) - Math.random()*vol);
  btcCandles.push({o:open,h:hi,l:lo,c:close});
  if(btcCandles.length>18) btcCandles.shift();
  btcCandleOpen = close;   // next candle opens where this one closed
}
function seedBtcCandles(){
  btcCandles=[]; btcCandleOpen=null; btcCandleClock=0;
  let p=620;
  for(let i=0;i<14;i++){ p*=1.035+Math.random()*0.03; pushBtcCandle(p); } // a green run-up to start
}
function updateEconomyTickers(){
  const cfg=L(), t=levelProgress();
  // BTC price curve
  if(level===7){
    // quiet, devastating crash over the first half of the famine
    const ct=Math.min(1,levelTimer/(30*60));
    btcPrice=lerp(cfg.btc[0], btcCount>0?6/btcCount:0, ct*ct);
    if(ct>=1&&!famineFlags.crashed){ famineFlags.crashed=true; }
  } else {
    btcPrice=lerp(cfg.btc[0],cfg.btc[1],t);
  }
  if(cfg.burger) burgerPrice=lerp(cfg.burger[0],cfg.burger[1],t);
  // feed the running candlestick tape (levels 1–7, before it flatlines)
  if(level<=7 && ++btcCandleClock>=18){ btcCandleClock=0; pushBtcCandle(btcPrice); }
  // language takeover ramps live within L8–10 so flips happen during play
  if(isEndgame()){
    const from = level===8?0 : CONFIG.levels[level-1].spanishRatio;
    const to = cfg.spanishRatio;
    const prev=spanishRatio;
    spanishRatio=lerp(from,to,levelTimer/(40*60));
    // any key crossing its threshold right now → glitch flicker
    for(const k in STR){
      const h=strHash(k);
      if(h>=prev&&h<spanishRatio) glitchFlips[k]=40;
    }
  }
  for(const k in glitchFlips) if(--glitchFlips[k]<=0) delete glitchFlips[k];
}
function checkLevelEnd(){
  const cfg=L();
  if(pac.dead) return;
  if(cfg.goal.type==='deports' && levelDeports>=cfg.goal.n) advanceLevel();
  else if(cfg.goal.type==='survive'){
    if(tick%60===0&&surviveLeft>0) surviveLeft--;
    if(surviveLeft<=0) advanceLevel();
  }
  // endless (L10): only death ends it
}
function advanceLevel(){
  if(level>=10) return;
  hiScore=Math.max(hiScore,score);
  startLevel(level+1);
}
function handleDeath(){
  deathTimer++;
  const animLen = finalDeath&&level===10 ? 240 : 120; // half-speed, almost tender
  if(deathTimer<animLen) return;
  if(level===10&&finalDeath){
    gameState='KILLSCREEN'; killScreenT=0; return;
  }
  if(lives<=0){ gameState='GAMEOVER'; gameoverTimer=0; stopMusic(); return; }
  // respawn at the spot farthest from danger
  pac.dead=false; pac.deadAnim=0; pac.invinc=240;
  const spots=[[11,11],[1,1],[21,1],[1,21],[21,21],[11,21],[1,11],[21,11]]
    .filter(([c,r])=>mapData[r][c]===0);
  let best=spots[0],bd=-1;
  for(const [c,r] of spots){
    let md=1e9;
    for(const g of ghosts) if(g.state==='CHASE'||g.state==='MIGRATE')
      md=Math.min(md,Math.abs(g.x-px(c))+Math.abs(g.y-py(r)));
    if(md>bd){bd=md;best=[c,r];}
  }
  pac.x=px(best[0]); pac.y=py(best[1]); pac.vx=0; pac.vy=0; pac.pvx=0; pac.pvy=0;
}

function update(){
  tick++;
  if(shake>0) shake--;
  if(btcFlash>0) btcFlash--;
  for(const f of floaters){ f.t--; f.y-=0.5; }
  floaters=floaters.filter(f=>f.t>0);
  updateWaka();

  if(gameState==='ATTRACT') return;
  if(gameState==='CARD'){
    cardTimer++;
    cardAlpha=Math.min(1,cardAlpha+0.06);
    if(cardTimer>240) cardDone=true;
    // no auto-advance — the card stays up until the player clicks/taps/keys through
    return;
  }
  if(gameState==='KILLSCREEN'){ killScreenT++; if(killScreenT>480){ gameState='FINALCARD'; finalCardT=0; } return; }
  if(gameState==='FINALCARD'){ finalCardT++; return; }
  if(gameState==='GAMEOVER'){ gameoverTimer++; return; }
  if(paused) return;

  if(readyTimer>0){ readyTimer--; return; }
  levelTimer++;
  if(level===8&&breachAnim<120) breachAnim++;
  // supplements restock
  for(const p of pellets) if(!p.active&&p.respawn>0&&--p.respawn<=0) p.active=true;
  updatePac();
  if(pac.dead){ handleDeath(); return; }
  updateGhosts();
  updateShops();
  updateEconomyTickers();
  updateMusicState();
  checkLevelEnd();
}

// Render at the device pixel ratio for crispness, then CSS-scale the element to
// fill the viewport (laptop = large, phone = fit, both orientations).
let RS=Math.min(window.devicePixelRatio||1, 2);
function fitCanvas(){
  RS=Math.min(window.devicePixelRatio||1, 2);
  canvas.width=Math.round(CW*RS); canvas.height=Math.round(CH*RS);
  const vw=window.innerWidth, vh=window.innerHeight;
  const scale=Math.min(vw/CW, vh/CH);          // largest aspect-preserving fit
  canvas.style.width=Math.round(CW*scale)+'px';
  canvas.style.height=Math.round(CH*scale)+'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', ()=>setTimeout(fitCanvas,150));

function drawWalls(){
  const p=pal();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cell=mapData[r][c];
    if(cell===0) continue;
    // shop tiles whose shop isn't part of this level render as plain wall
    if(cell===2 && shops[MAP_SRC[r][c]]) continue;
    const x=SIDE+c*TILE, y=TOP+r*TILE;
    ctx.fillStyle=p.wall; ctx.fillRect(x,y,TILE,TILE);
    ctx.fillStyle=p.wall2; ctx.fillRect(x+1,y+1,TILE-2,TILE-2);
    ctx.fillStyle=p.wall; ctx.fillRect(x+3,y+3,TILE-6,TILE-6);
  }
  // Border wall at top — the wall ghosts get launched over
  ctx.fillStyle= level>=8 ? '#6B4B3A':'#8A8A92';
  ctx.fillRect(SIDE,TOP-6,GW,8);
  if(level<8){ // razor wire
    ctx.strokeStyle='#CFCFD6'; ctx.lineWidth=1;
    for(let x=SIDE+6;x<SIDE+GW;x+=14){
      ctx.beginPath(); ctx.arc(x,TOP-6,4,0,Math.PI*2); ctx.stroke();
    }
  } else { // the breach
    const bw=Math.min(70,breachAnim*1.2+30);
    const bx=SIDE+px(11)-bw/2;
    ctx.fillStyle=pal().bg; ctx.fillRect(bx,TOP-8,bw,12);
    ctx.strokeStyle='#553322'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(bx,TOP-8); ctx.lineTo(bx+6,TOP+2); ctx.moveTo(bx+bw,TOP-8); ctx.lineTo(bx+bw-6,TOP+2);
    ctx.stroke();

}

function drawGhost(g,sc){
  ctx.save(); ctx.translate(SIDE+g.x,g.y);
  if(sc) ctx.scale(sc,sc);
  const r=g.r, bob=Math.sin(g.anim)*1.6;
  const fright=g.state==='FRIGHT';
  const flash=fright&&g.frightLeft<120&&Math.floor(g.frightLeft/12)%2===0;
  let bodyCol;
  if(fright) bodyCol=flash?'#EEEEFF':'#2233DD';
  else if(g.vivid) bodyCol=g.vivid.c;
  else bodyCol=GHOST_BROWNS[g.id%6];
  // classic silhouette
  ctx.beginPath();
  ctx.arc(0,-r*0.2+bob,r,Math.PI,0);
  ctx.lineTo(r,r*0.72+bob);
  for(let i=4;i>=0;i--){
    const wx=-r+i*(r*2/4);
    ctx.lineTo(wx, r*0.72-(i%2===0?r*0.3:0)+bob);
  }
  ctx.lineTo(-r,r*0.72+bob); ctx.closePath();
  ctx.fillStyle=bodyCol; ctx.fill();

  ctx.fillStyle=fright?'#FF8888':'#23324A';

  ctx.beginPath(); ctx.arc( r*0.32+lx,-r*0.24+ly+bob,r*0.1,0,7); ctx.fill();

    // sombrero — worn the way a bigot fails to see them: plain, neutral

    ctx.beginPath(); ctx.ellipse(0,hy,r*1.5,r*0.27,0,0,7); ctx.fill();
    ctx.strokeStyle='#A88B3A'; ctx.lineWidth=1; ctx.stroke();
    const trim=['#2E8B57','#D2392E','#F2C12E','#2A6FB8'];
    ctx.lineWidth=1.6;
    for(let i=0;i<16;i++){
      ctx.strokeStyle=trim[i%4];
      ctx.beginPath(); ctx.ellipse(0,hy,r*1.42,r*0.24,0,(i/16)*7,((i+1)/16)*7); ctx.stroke();
    }
    ctx.fillStyle='#F5E5B8';
    ctx.beginPath(); ctx.moveTo(-r*0.5,hy); ctx.quadraticCurveTo(0,hy-r*1.35,r*0.5,hy); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#A88B3A'; ctx.lineWidth=0.8; ctx.stroke();

      const flip=Math.sin(g.cooking*0.15)*5;

      ctx.fillStyle='#BBB'; ctx.fillRect(r*0.8+10,r*0.1-2,7,6);
      drawMiniBurger(r*0.8+13, r*0.1-5-Math.abs(flip));
    }

    // re-humanized: simple distinct details
    const hy=-r*0.85+bob;
    if(g.vivid.hat==='cap'){
      ctx.fillStyle='#FFF8E8';
      ctx.beginPath(); ctx.arc(0,hy+r*0.18,r*0.55,Math.PI,0); ctx.fill();
      ctx.fillRect(-r*0.55,hy+r*0.14,r*1.35,r*0.12);
    } else if(g.vivid.hat==='apron'){
      ctx.fillStyle='rgba(255,255,255,0.85)';
      ctx.fillRect(-r*0.5,bob+r*0.05,r,r*0.6);
      ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1; ctx.strokeRect(-r*0.5,bob+r*0.05,r,r*0.6);
    } else if(g.vivid.hat==='guitar'){
      ctx.save(); ctx.rotate(0.5);
      ctx.fillStyle='#8B5A2B';
      ctx.beginPath(); ctx.arc(r*0.55,r*0.35,r*0.34,0,7); ctx.fill();
      ctx.fillRect(r*0.55,r*0.22,r*0.7,r*0.12);
      ctx.restore();
    }
  }
  ctx.restore();

function drawPacSprite(x,y,st,facing,mouth,deadAnim){
  const baseR=TILE*0.42, sc=STATE_SCALE[st], r=baseR*sc;
  ctx.save(); ctx.translate(x,y);
  if(deadAnim!==undefined){
    // classic fold-closed death: mouth widens until the wedge vanishes
    const len=(finalDeath&&level===10)?240:120;
    const t=Math.min(1,deadAnim/len);
    const m=t*Math.PI;
    if(t<1){
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.arc(0,0,r,-Math.PI/2+m,-Math.PI/2-m+Math.PI*2,false);
      ctx.closePath(); ctx.fillStyle=STATE_COLOR[st]; ctx.fill();
    }
    ctx.restore(); return;
  }
  if(facing===-1) ctx.scale(-1,1);
  const m=mouth;
  // body wedge
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.arc(0,0,r,m,Math.PI*2-m); ctx.closePath();
  ctx.fillStyle=STATE_COLOR[st]; ctx.fill();
  if(st==='RENAL'){ // pale gray tint, sickly
    ctx.globalAlpha=0.35; ctx.fillStyle='#9AA8A0';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,r,m,Math.PI*2-m); ctx.closePath(); ctx.fill();
    ctx.globalAlpha=1;
  }
  // sickness green: ramps through the famine (L7) and stays on the terminal bloated body
  let green=0;
  if(st==='WITHERED') green=0.55;
  else if(level===7) green=Math.min(0.55, levelTimer/(18*60));
  if(green>0){
    ctx.globalAlpha=green; ctx.fillStyle='#5FA84B';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,r,m,Math.PI*2-m); ctx.closePath(); ctx.fill();
    ctx.globalAlpha=1;
  }
  if(st==='WITHERED'&&Math.floor(tick/8)%4===0){ ctx.globalAlpha=0.5; } // sickly flicker
  // BUFF: flex arms; SWOLE: veins + sunglasses; FAT: belly line
  if(st==='BUFF'||st==='SWOLE'){
    ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(-r*0.45,r*0.2,r*0.32,Math.PI*0.2,Math.PI*1.2); ctx.stroke();
  }
  if(st==='SWOLE'){
    ctx.strokeStyle='rgba(160,60,60,0.5)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-r*0.2,-r*0.55); ctx.lineTo(-r*0.05,-r*0.3); ctx.lineTo(-r*0.25,-r*0.1); ctx.stroke();
    // sunglasses
    ctx.fillStyle='#111';
    ctx.fillRect(r*0.05,-r*0.46,r*0.42,r*0.2);
    ctx.fillRect(r*0.0,-r*0.42,r*0.1,r*0.06);
  } else {
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(r*0.26,-r*0.36,Math.max(1.6,r*0.10),0,7); ctx.fill();
  }
  if(st==='FAT'||st==='RENAL'||st==='WITHERED'){
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(0,r*0.35,r*0.5,Math.PI*0.15,Math.PI*0.85); ctx.stroke();
  }
  // the red cap (from the prototype's drawing math)
  ctx.save();
  ctx.translate(-r*0.20,-r*0.70); ctx.rotate(-0.22); ctx.scale(1.35,1.35);
  const hatRed='#E32127';
  ctx.fillStyle=hatRed;
  ctx.beginPath(); ctx.arc(0,0,r*0.62,Math.PI,0); ctx.closePath(); ctx.fill();
  if(r>4){ ctx.fillStyle='#FFF'; ctx.fillRect(0,-r*0.15,r*0.62,r*0.13); }
  ctx.fillStyle=hatRed; ctx.fillRect(-r*0.62,0,r*1.5,r*0.11);
  ctx.restore();
  ctx.globalAlpha=1;
  ctx.restore();
}

function fmtUSD(v){
  if(v>=1000) return '$'+(v/1000).toFixed(v>=10000?0:1)+'k';
  return '$'+v.toFixed(2);
}
function drawConfedFlag(fx,fy,fw,fh,alive,tatter){
  if(!alive){
    ctx.fillStyle='#222'; ctx.fillRect(fx,fy,fw,fh);
    ctx.strokeStyle='#444'; ctx.lineWidth=0.5; ctx.strokeRect(fx,fy,fw,fh);
    return;
  }
  ctx.save();
  if(tatter>0){ ctx.globalAlpha=Math.max(0,1-tatter/60); }
  ctx.fillStyle='#CC0000'; ctx.fillRect(fx,fy,fw,fh);
  ctx.strokeStyle='#0033AA'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(fx+fw,fy+fh); ctx.moveTo(fx+fw,fy); ctx.lineTo(fx,fy+fh); ctx.stroke();
  ctx.strokeStyle='#FFF'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(fx+fw,fy+fh); ctx.moveTo(fx+fw,fy); ctx.lineTo(fx,fy+fh); ctx.stroke();
  ctx.fillStyle='#FFF';
  [[0.5,0.5],[0.25,0.25],[0.75,0.25],[0.25,0.75],[0.75,0.75]].forEach(([ax,ay])=>{
    ctx.beginPath(); ctx.arc(fx+fw*ax,fy+fh*ay,1,0,7); ctx.fill();
  });
  if(tatter>0){ // tattering: bites torn out
    ctx.globalCompositeOperation='destination-out';
    for(let i=0;i<tatter/6;i++){
      ctx.beginPath(); ctx.arc(fx+((i*37)%fw),fy+((i*23)%fh),2+i*0.5,0,7); ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
  }
  ctx.restore();
}
function glitchText(key,txt){
  if(!glitchFlips[key]) return txt;
  if(Math.floor(glitchFlips[key]/4)%2===0){
    return txt.split('').map(ch=>Math.random()<0.5?'▓▒░@#%'[(Math.random()*6)|0]:ch).join('');
  }
  return txt;
}

function wrapText(txt,maxW,font){
  ctx.font=font;
  const words=txt.split(' '), lines=[]; let cur='';
  for(const w of words){
    const test=cur?cur+' '+w:w;
    if(ctx.measureText(test).width>maxW&&cur){ lines.push(cur); cur=w; }
    else cur=test;
  }
  if(cur) lines.push(cur);
  return lines;
}

function drawFinalCard(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,CH);
  const a=Math.min(1,finalCardT/90);
  ctx.save(); ctx.globalAlpha=a;
  ctx.fillStyle='#FFF'; ctx.textAlign='center';
  ctx.font='bold 26px monospace';
  ctx.fillText('FIN DEL JUEGO.',CW/2,CH*0.38);
  if(finalCardT>140){
    ctx.font='bold 15px monospace';
    ctx.fillText('NUNCA HUBO UN NIVEL DONDE GANAS.',CW/2,CH*0.50);
  }
  if(finalCardT>240&&Math.floor(tick/24)%2===0){
    ctx.font='bold 13px monospace'; ctx.fillStyle='#FFD700';
    ctx.fillText('INSERTE MONEDA PARA CREERLO OTRA VEZ.',CW/2,CH*0.64);
  }
  // the surprise: where the quarters went
  if(finalCardT>380){
    const a2=Math.min(1,(finalCardT-380)/90);
    ctx.globalAlpha=a2;
    ctx.fillStyle='#888'; ctx.font='10px monospace';
    ctx.fillText('— P.D. —',CW/2,CH*0.76);
    ctx.fillStyle='#FFF'; ctx.font='bold 11px monospace';
    ctx.fillText('CADA MONEDA DE 50¢ FUE DONADA A LA NAACP.',CW/2,CH*0.81);
    ctx.fillStyle='#44DD44'; ctx.font='bold 15px monospace';

    ctx.globalAlpha=a;
  }
  ctx.restore();
}
function drawGameOver(){
  drawPlayfield(); drawHUD();
  ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#FF4444'; ctx.font='bold 32px monospace'; ctx.textAlign='center';
  ctx.fillText(T('GAMEOVER'),CW/2,CH/2-40);
  ctx.fillStyle='#FFDD44'; ctx.font='14px monospace';
  ctx.fillText(T('SCORE')+': '+score,CW/2,CH/2);
  if(gameoverTimer>90&&Math.floor(tick/24)%2===0){
    ctx.fillStyle='#FFF'; ctx.font='bold 12px monospace';
    ctx.fillText(T('INSERTCOIN'),CW/2,CH/2+60);
  }
}
function drawPlayfield(){
  const p=pal();
  ctx.fillStyle=p.bg; ctx.fillRect(SIDE,TOP,GW,GH);
  ctx.save();
  if(shake>0) ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  drawBorderStrip();
  drawWalls(); drawShops();
  for(const f of foods) if(f.active){
    if(f.type==='burger') drawBurger(SIDE+f.x,f.y,f.stale); else drawTaco(SIDE+f.x,f.y);
  }
  for(const pl of pellets) if(pl.active) drawPellet(pl);
  for(const g of ghosts) if(g.state!=='DEPORTED'&&g.state!=='DEPORT'&&g.state!=='GONE') drawGhost(g);
  if(pac) drawPac();
  for(const fl of floaters){
    ctx.globalAlpha=Math.min(1,fl.t/30);
    ctx.fillStyle=fl.col; ctx.font='bold 10px monospace'; ctx.textAlign='center';
    ctx.fillText(fl.txt,SIDE+fl.x,fl.y);
    ctx.globalAlpha=1;
  }
  ctx.restore();
}
function render(){
  ctx.setTransform(RS,0,0,RS,0,0);   // map logical CW×CH space onto the HiDPI backing store
  ctx.clearRect(0,0,CW,CH);
  if(gameState==='ATTRACT'){ drawAttract(); return; }
  if(gameState==='CARD'){ drawCard(); return; }
  if(gameState==='KILLSCREEN'){ drawKillScreen(); return; }
  if(gameState==='FINALCARD'){ drawFinalCard(); return; }
  if(gameState==='GAMEOVER'){ drawGameOver(); return; }
  drawPlayfield();
  drawHUD();
  if(readyTimer>0){
    ctx.fillStyle='#FFD700'; ctx.font='bold 18px monospace'; ctx.textAlign='center';
    ctx.fillText(glitchText('READY',T('READY')),CW/2,TOP+GH/2+50);
  }
  if(paused){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#FFF'; ctx.font='bold 22px monospace'; ctx.textAlign='center';
    ctx.fillText(T('PAUSE'),CW/2,CH/2);
  }
}

function tone(freq,dur,type,gain,when,bend){
  if(!AC||muted) return;

  const o=AC.createOscillator(), g=AC.createGain();

  g.gain.setValueAtTime(gain||0.1,t0);
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);

}

  [880,1],[784,1],[660,1],[587,1],[660,2],[0,2],

function playThemeLoop(rate,thin,gainMult){
  if(!AC||musicMode==null) return;
  const beat=0.16/rate;
  let ms=0,bi=0;
  for(const [f,b] of THEME){
    const dur=b*beat;
    if(f>0) sched(()=>{ if(musicMode) tone(f,dur*0.85,'square',0.055*gainMult); },ms);

      sched(()=>{ if(musicMode) tone(bf,dur*0.5,'triangle',0.07*gainMult); },ms);
      if(bi%2===0) sched(()=>{ if(musicMode) tone(2200,0.03,'square',0.015*gainMult); },ms); // hat

    ms+=dur*1000; bi++;

  sched(()=>playThemeLoop(rate,thin,gainMult),ms+30);
}

const DIRS={ArrowLeft:[-1,0],ArrowRight:[1,0],ArrowUp:[0,-1],ArrowDown:[0,1],
            a:[-1,0],d:[1,0],w:[0,-1],s:[0,1],A:[-1,0],D:[1,0],W:[0,-1],S:[0,1]};
document.addEventListener('keydown',e=>{
  if(landingVisible()) return; // the coin machine takes it from here
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  initAudio();
  if(e.key==='m'||e.key==='M'){ muted=!muted; if(muted)stopMusic(); else if(gameState==='PLAYING')startLevelMusic(); return; }
  if(e.key==='p'||e.key==='P'){ if(gameState==='PLAYING') paused=!paused; return; }
  if(gameState==='ATTRACT'){ resetGame(); startLevel(1); return; }
  if(gameState==='CARD'){
    if(cardDone||cardTimer>30){
      gameState='PLAYING'; readyTimer=80;
      startLevelMusic();
    }
    return;
  }
  if(gameState==='FINALCARD'){
    // INSERTE MONEDA PARA CREERLO OTRA VEZ — literally: back to the coin slot
    if(finalCardT>300){ showLanding(); }
    return;
  }
  if(gameState==='GAMEOVER'){
    if(gameoverTimer>90){ showLanding(); }
    return;
  }
  if(gameState==='PLAYING'&&!paused&&pac&&!pac.dead){
    const d=DIRS[e.key];
    if(d){ pac.pvx=d[0]; pac.pvy=d[1]; }
  }
});

    if(Math.abs(dx)>Math.abs(dy)){ pac.pvx=dx>0?1:-1; pac.pvy=0; }
    else { pac.pvx=0; pac.pvy=dy>0?1:-1; }
  }
}

function showLanding(){
  stopMusic(); paused=false; gameState='ATTRACT';
  document.getElementById('coin').classList.remove('dropping','dropped');
  document.getElementById('goOverlay').classList.remove('active');
  landingEl.style.display='flex';
}
let launching=false;
function hideLandingAndStart(){
  launching=false;
  landingEl.style.display='none';
  initAudio(); resetGame(); startLevel(1);
}
// starfield — 140 stars across 200vw, parallax drift
(function(){
  const starsEl=document.getElementById('stars');
  for(let i=0;i<140;i++){
    const s=document.createElement('div'); s.className='star';
    s.style.left=(Math.random()*200)+'vw';
    s.style.top=Math.random()*100+'%';
    s.style.setProperty('--d',(1.5+Math.random()*3)+'s');
    s.style.setProperty('--del',(Math.random()*3)+'s');
    s.style.setProperty('--drift',(120+Math.random()*180)+'s');
    s.style.setProperty('--driftDel',(-Math.random()*180)+'s');
    starsEl.appendChild(s);
  }
})();
document.getElementById('btnInsert').addEventListener('click',e=>{
  e.preventDefault();
  if(launching) return; launching=true;
  const coin=document.getElementById('coin');
  coin.classList.add('dropping');
  setTimeout(()=>coin.classList.add('dropped'),50);
  setTimeout(()=>{
    addQuarters();
    const o=document.getElementById('goOverlay');
    o.textContent='LOADING...'; o.classList.add('active');
    setTimeout(hideLandingAndStart,700);
  },600);
});
document.getElementById('slot').addEventListener('click',()=>{
  document.getElementById('btnInsert').click();
});
document.getElementById('btnDecline').addEventListener('click',()=>{
  if(launching) return; launching=true;
  const o=document.getElementById('goOverlay');
  o.textContent='PLAY FREE!'; o.classList.add('active');
  setTimeout(hideLandingAndStart,600);
});

// ── Boot ──
buildMap();
function loop(){ update(); render(); updateDpad(); requestAnimationFrame(loop); }
loop();

</script>
</body>
